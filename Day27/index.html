<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Insights | Mystical Astrology</title>
    <link rel="stylesheet" href="./style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Animated Starry Background Elements -->
    <div class="stars"></div>

    <div class="main-container glass">
        <div class="header">
            <div class="mystic-icon">✨</div>
            <h1>Astro Oracle</h1>
            <p>Enter your earthly coordinates to reveal your cosmic destiny.</p>
        </div>

        <form id="astroForm" class="glowing-form">
            <div class="input-row">
                <div class="input-group">
                    <label for="name">First Name</label>
                    <input type="text" id="name" placeholder="E.g. Orion" required>
                </div>
                <div class="input-group">
                    <label for="surname">Surname</label>
                    <input type="text" id="surname" placeholder="E.g. Starborn" required>
                </div>
            </div>

            <div class="input-row triplet">
                <div class="input-group">
                    <label for="day">Day</label>
                    <input type="number" id="day" min="1" max="31" placeholder="DD" required>
                </div>
                <div class="input-group">
                    <label for="month">Month</label>
                    <input type="number" id="month" min="1" max="12" placeholder="MM" required>
                </div>
                <div class="input-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" min="1900" max="2024" placeholder="YYYY" required>
                </div>
            </div>

            <button type="submit" id="reveal-btn" class="reveal-btn">
                <span>Read My Destiny</span>
                <i class="sparkle">✦</i>
            </button>
        </form>

        <div id="loading-zone" class="reading-phase hidden">
            <div class="crystal-ball">🔮</div>
            <p id="loading-text" class="pulsate">Aligning the planets...</p>
        </div>

        <div id="result-zone" class="result-phase hidden">
            <!-- Dynamic Cards generated by Javascript -->
            <div class="card-grid" id="destiny-cards">
                <!-- Cards inject here -->
            </div>

            <button id="reset-btn" class="secondary-btn">Consult the stars again</button>
        </div>
    </div>

    <script src="./first.js"></script>
</body>

</html>
